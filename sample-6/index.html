<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>style属性：ボタンで色変更</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <p :style="{color: textColor}">
        カラーテキスト
    </p>

    <button @click="textColor = '#086776'">
        緑に変更
    </button>
  </div>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="script.js"></script>
</body>
</html>
