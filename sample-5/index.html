<html lang="ja">
<head>

  <title>style属性：文字色変更</title>
</head>
<body>
    <div id="app">
     <p :style="{
        color: textColor,
        fontSize: fontSize + 'px'
    }">
         テキスト
     </p>

  <script src="script.js"></script>
</body>
</html>
